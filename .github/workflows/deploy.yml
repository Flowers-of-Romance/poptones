name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: deno-${{ runner.os }}-
      - name: Build (retry transient CDN/network failures)
        run: |
          n=0
          until deno task build; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then echo "build failed after $n attempts"; exit 1; fi
            echo "build attempt $n failed; retrying in 15s"; sleep 15
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
